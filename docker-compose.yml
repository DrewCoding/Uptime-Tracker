services:
  db:
    image: postgres:15-alpine
    container_name: uptime_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init_schema.sql:/docker-entrypoint-initdb.d/init_schema.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U drew -d uptime_monitor" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
